name: Bug report
description: Report an incorrect result, crash, performance regression, or reproducibility problem
title: "[Bug]: "
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Include the incorrect output or error message.
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Reproduction command
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: input
    id: revision
    attributes:
      label: Commit or version
      placeholder: Commit SHA or v0.1.0
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, SymPy, operating system, hardware, prime, and search mode.
    validations:
      required: true
